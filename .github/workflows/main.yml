name: Build EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── requirements.txt OLMADAN direkt yükleme ──
      - name: 📦 PyInstaller yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: 🔨 EXE oluştur
        run: |
          pyinstaller --noconfirm --onefile --windowed ^
            --name "FileCopyMoveDelete" ^
            --clean ^
            main.py

      - name: 📤 EXE'yi artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: FileCopyMoveDelete-Windows
          path: dist/FileCopyMoveDelete.exe
          retention-days: 90

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 PyInstaller yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: 🔨 Binary oluştur
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "FileCopyMoveDelete" \
            --clean \
            main.py

      - name: 📤 Binary'yi artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: FileCopyMoveDelete-Linux
          path: dist/FileCopyMoveDelete
          retention-days: 90

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Windows artifact indir
        uses: actions/download-artifact@v4
        with:
          name: FileCopyMoveDelete-Windows
          path: ./windows

      - name: 📥 Linux artifact indir
        uses: actions/download-artifact@v4
        with:
          name: FileCopyMoveDelete-Linux
          path: ./linux

      - name: 🏷️ GitHub Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## File Copy/Move/Delete ${{ github.ref_name }}
            
            - **Windows:** `FileCopyMoveDelete.exe`
            - **Linux:** `FileCopyMoveDelete`
          draft: false
          prerelease: false
          files: |
            ./windows/FileCopyMoveDelete.exe
            ./linux/FileCopyMoveDelete
